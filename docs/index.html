/vercel-labs/agent-skills/blob/main/skills/vercel-optimize/SKILL.md","source_path":"skills/vercel-optimize/SKILL.md","title":{"zh-CN":"Vercel 成本与性能优化","en":"Vercel cost and performance optimization"},"purpose":{"zh-CN":"先收集真实 Vercel 使用指标，再把成本高、速度慢或配置不合理的问题定位到具体路由和代码，输出按收益排序的改进方案。","en":"Collects real Vercel usage signals first, then traces costly, slow, or misconfigured behavior to routes and code and ranks improvements by value."},"capabilities":{"zh-CN":["采集函数调用、构建分钟、传输、缓存和 Web Vitals 等信号","只深入调查有指标证据的候选问题","把平台数据与项目代码和配置对应起来","验证框架版本与官方文档后形成优化建议","生成成本、性能和可靠性综合报告"],"en":["Collects function, build, transfer, cache, and Web Vitals signals","Investigates only metric-backed candidates","Connects platform data to project code and configuration","Checks framework versions and official guidance before recommending changes","Produces a combined cost, performance, and reliability report"]},"minimum_inputs":{"zh-CN":["已部署的 Vercel 项目","可读取项目指标和代码的权限"],"en":["A deployed Vercel project","Access to project metrics and code"]},"optional_inputs":{"zh-CN":["重点账单项、目标预算、问题路由和分析时间范围"],"en":["Priority bill items, budget target, suspected routes, and analysis window"]},"outputs":{"zh-CN":["当前成本和性能基线","有证据的问题清单","按影响与实施成本排序的建议","每项建议的验证方式"],"en":["Current cost and performance baseline","Evidence-backed findings","Recommendations ranked by impact and effort","A verification method for each recommendation"]},"examples":{"zh-CN":["分析这个 Vercel 项目最近 30 天为什么函数调用费用上涨，并给出优先修复项。","找出最值得做的缓存和构建分钟优化，不要只给通用建议。"],"en":["Explain why function-invocation cost rose over the last 30 days and prioritize fixes.","Find the highest-value cache and build-minute optimizations; avoid generic advice."]},"requirements":{"zh-CN":["需要 Vercel 指标、项目配置和代码证据","主要支持 Next.js、SvelteKit、Nuxt，Astro 支持有限","没有数据支撑时不会给出确定性优化结论"],"en":["Requires Vercel metrics, project configuration, and code evidence","Primarily supports Next.js, SvelteKit, and Nuxt, with limited Astro support","Does not make definitive optimization claims without data"]}},{"name":"web-design-guidelines","source_url":"https://github.com/vercel-labs/agent-skills/blob/main/skills/web-design-guidelines/SKILL.md","source_path":"skills/web-design-guidelines/SKILL.md","title":{"zh-CN":"Web 界面规范审查","en":"Web interface guidelines review"},"purpose":{"zh-CN":"按最新 Web 界面规范审查前端代码，找出影响可访问性、交互、性能和用户体验的问题。","en":"Reviews frontend code against current web interface guidelines for accessibility, interaction, performance, and UX issues."},"capabilities":{"zh-CN":["检查语义、ARIA、键盘操作和焦点状态","审查表单、动画、排版、图片与触控体验","检查导航状态、深链接、主题和国际化","按文件与行号输出简洁问题清单"],"en":["Checks semantics, ARIA, keyboard interaction, and focus states","Reviews forms, motion, typography, images, and touch behavior","Checks navigation state, deep links, themes, and internationalization","Returns concise findings with file and line references"]},"minimum_inputs":{"zh-CN":["需要审查的 Web UI 代码或文件范围"],"en":["The web UI code or file scope to review"]},"optional_inputs":{"zh-CN":["目标用户、浏览器范围和已知可访问性要求"],"en":["Target users, browser scope, and known accessibility requirements"]},"outputs":{"zh-CN":["按文件定位的规范问题","问题对应的规则和影响","直接可执行的修改方向"],"en":["Guideline issues located by file","The relevant rule and user impact","Actionable remediation guidance"]},"examples":{"zh-CN":["审查 src/components 下的 UI，重点看键盘操作、表单错误和移动端触控。","检查这个页面是否符合常见 Web 界面最佳实践，只报告明确问题。"],"en":["Review the UI under src/components, focusing on keyboard use, form errors, and mobile touch.","Check this page against common web interface best practices and report only concrete issues."]},"requirements":{"zh-CN":["运行时会读取远程最新版规范，需要网络访问","它审查代码规则，不替代真实用户测试或完整无障碍认证"],"en":["Fetches the latest remote guidelines and therefore needs network access","Code-rule review does not replace user testing or full accessibility certification"]}},{"name":"writing-guidelines","source_url":"https://github.com/vercel-labs/agent-skills/blob/main/skills/writing-guidelines/SKILL.md","source_path":"skills/writing-guidelines/SKILL.md","title":{"zh-CN":"技术文档与产   function renderHeader(){document.documentElement.lang=lang;document.title=loc(DATA.title);text($("eyebrow"),UI[lang].eyebrow);text($("title"),loc(DATA.title));text($("subtitle"),loc(DATA.subtitle));const n=DATA.projects.reduce((sum,p)=>sum+p.skills.length,0);text($("total"),`${n}${UI[lang].skills}`);text($("generated"),`${UI[lang].generated}: ${DATA.generated_at||"—"}`);const box=$("language");box.replaceChildren();if(ALLOWED.length>1){box.append(text(document.createElement("span"),UI[lang].language));for(const code of ALLOWED){const b=document.createElement("button");text(b,code==="zh-CN"?"中文":"English");b.setAttribute("aria-pressed",String(code===lang));b.onclick=()=>{lang=code;render()};box.append(b)}}}
